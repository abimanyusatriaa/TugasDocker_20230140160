<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Home - Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 min-h-screen">
<nav class="bg-white shadow-sm p-4 mb-8">
    <div class="container mx-auto flex justify-between items-center">
        <h1 class="text-xl font-bold text-blue-600">MY Website "Abimanyu Satria"</h1>
        <a href="/" class="text-red-500 hover:text-red-700 font-medium">Logout</a>
    </div>
</nav>

<div class="container mx-auto px-4">
    <div class="bg-white rounded-lg shadow-sm p-6">
        <div class="flex justify-between items-center mb-6">
            <div>
                <h2 class="text-2xl font-semibold text-gray-800">Data Mahasiswa</h2>
                <p class="text-gray-500 text-sm">Daftar mahasiswa yang terdaftar di sistem</p>
            </div>
            <a href="/form" class="bg-green-500 hover:bg-green-600 text-white px-4 py-2 rounded-md transition inline-block">
                + Input Data Mahasiswa
            </a>
        </div>

        <div class="overflow-x-auto">
            <table class="w-full text-left border-collapse">
                <thead>
                <tr class="bg-gray-100 border-b">
                    <th class="px-6 py-3 text-sm font-semibold text-gray-600">No</th>
                    <th class="px-6 py-3 text-sm font-semibold text-gray-600">Nama</th>
                    <th class="px-6 py-3 text-sm font-semibold text-gray-600">NIM</th>
                    <th class="px-6 py-3 text-sm font-semibold text-gray-600">Jenis Kelamin</th>
                </tr>
                </thead>
                <tbody class="divide-y divide-gray-200">
                <tr th:if="${mahasiswaList == null or #lists.isEmpty(mahasiswaList)}">
                    <td colspan="4" class="px-6 py-10 text-center text-gray-400">Belum ada data tersedia</td>
                </tr>
                <tr th:each="mhs, stat : ${mahasiswaList}" class="hover:bg-gray-50">
                    <td class="px-6 py-4" th:text="${stat.count}"></td>
                    <td class="px-6 py-4 font-medium text-gray-900" th:text="${mhs.nama}"></td>
                    <td class="px-6 py-4 text-gray-600" th:text="${mhs.nim}"></td>
                    <td class="px-6 py-4">
                                <span th:text="${mhs.jenisKelamin}"
                                      class="px-3 py-1 rounded-full text-xs font-semibold"
                                      th:classappend="${mhs.jenisKelamin == 'Laki-laki' ? 'bg-blue-100 text-blue-800' : 'bg-pink-100 text-pink-800'}">
                                </span>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>
</body>
</html>
