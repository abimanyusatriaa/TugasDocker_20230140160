<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Form Input Mahasiswa</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 py-10">
<div class="max-w-md mx-auto bg-white p-8 rounded-lg shadow-md">
    <h2 class="text-2xl font-bold mb-6 text-gray-800 border-b pb-2">Form Input Mahasiswa</h2>

    <form action="/submit" method="post" class="space-y-5">
        <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Nama Lengkap</label>
            <input type="text" name="nama" placeholder="Masukkan nama..." class="w-full px-3 py-2 border border-gray-300 rounded-md focus:ring-2 focus:ring-blue-500 focus:outline-none"/>
        </div>

        <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">NIM</label>
            <input type="text" name="nim" placeholder="Contoh: 20230140xxx" class="w-full px-3 py-2 border border-gray-300 rounded-md focus:ring-2 focus:ring-blue-500 focus:outline-none"/>
        </div>

        <div>
            <label class="block text-sm font-medium text-gray-700 mb-2">Jenis Kelamin</label>
            <div class="flex items-center space-x-6">
                <label class="inline-flex items-center">
                    <input type="radio" name="jenisKelamin" value="Laki-laki" class="text-blue-600 focus:ring-blue-500"/>
                    <span class="ml-2 text-gray-700">Laki-laki</span>
                </label>
                <label class="inline-flex items-center">
                    <input type="radio" name="jenisKelamin" value="Perempuan" class="text-pink-600 focus:ring-pink-500"/>
                    <span class="ml-2 text-gray-700">Perempuan</span>
                </label>
            </div>
        </div>

        <div class="pt-4 flex items-center justify-between">
            <a href="/home" class="text-sm text-gray-500 hover:underline">← Kembali ke Home</a>
            <button type="submit" class="bg-blue-600 text-white px-6 py-2 rounded-md hover:bg-blue-700 shadow-sm transition">
                Simpan Data
            </button>
        </div>
    </form>
</div>
</body>
</html>
